  <text x="40" y="44" font-size="21" font-weight="700" fill="#1F2933">Remote Claude Code Agent Orchestration</text>
  <text x="40" y="66" font-size="13" fill="#52606D">Discord-based control plane triggering headless Claude Code agents across three development machines</text>
  <rect x="40" y="150" width="150" height="120" rx="10" fill="#F5F7FA" stroke="#9AA5B1" stroke-width="1.5"/>
