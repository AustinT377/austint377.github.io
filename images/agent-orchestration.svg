  <text x="115" y="218" font-size="12" fill="#52606D" text-anchor="middle">anywhere</text>
  <text x="115" y="248" font-size="11" font-family="'SF Mono', Menlo, monospace" fill="#0E7490" text-anchor="middle">/run PROJ-123</text>
  <line x1="190" y1="210" x2="248" y2="210" stroke="#52606D" stroke-width="1.5" marker-end="url(#arrow)"/>
